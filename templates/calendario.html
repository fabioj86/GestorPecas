<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calendário de Manutenção Preventiva</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    <style>
        #calendar { max-width: 80%; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .fc-event { cursor: pointer; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid mt-4">
    <div class="row mb-3">
        <div class="col-md-6">
            <h2><i class="form-icon"></i> Cronograma de Manutenções Industriais</h2>
        </div>
        <div class="col-md-6 text-right">
            <button class="btn btn-primary" data-toggle="modal" data-target="#modalNovoAgendamento">+ Programar Manutenção</button>
            <a href="/dashboard" class="btn btn-secondary">Voltar ao Painel</a>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body row">
            <div class="col-md-4">
                <label><b>Filtrar por Status:</b></label>
                <select id="filtroStatus" class="form-control" onchange="recarregarEventos()">
                    <option value="">Todos os Status</option>
                    <option value="Pendente">Pendentes</option>
                    <option value="Em Atraso">Em Atraso</option>
                    <option value="Concluida">Concluídas</option>
                </select>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div id="calendar"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalNovoAgendamento" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <form action="/manutencao/programar" method="POST" class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Programar Nova Manutenção</h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Equipamento / Máquina</label>
                    <select name="maquina_id" class="form-control" required>
                        {% for m in maquinas %}
                        <option value="{{ m.id }}">{{ m.codigo }} - {{ m.descricao }} (Linha: {{ m.linha }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Data da Manutenção</label>
                    <input type="date" name="data_programada" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Descrição das Atividades Preventivas</label>
                    <textarea name="descricao_atividades" class="form-control" rows="3" placeholder="Ex: Troca de óleo, verificação de rolamentos e reaperto de painel elétrico..." required></textarea>
                </div>

                <div class="form-group bg-light p-3 border rounded">
                    <div class="custom-control custom-checkbox">
                        <input type="checkbox" class="custom-control-input" id="gerar_os" name="gerar_os" value="sim" checked>
                        <label class="custom-control-label text-dark font-weight-bold" for="gerar_os">
                            Gerar Ordem de Serviço automaticamente para esta manutenção?
                        </label>
                    </div>
                    <small class="text-muted d-block mt-1">Se marcado, o sistema criará uma O.S vinculada e mudará o status da máquina.</small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-success">Agendar e Salvar</button>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="modalDetalhesManutencao" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title" id="detalheTitulo">Detalhes do Agendamento</h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p><b>Equipamento:</b> <span id="detalheMaquina"></span></p>
                <p><b>Setor/Linha:</b> <span id="detalheLinha"></span></p>
                <p><b>Status Atual:</b> <span id="detalheStatus" class="badge"></span></p>
                <p><b>O.S. Vinculada:</b> <span id="detalheOS" class="badge badge-secondary"></span></p>
                <hr>
                <h6><b>Atividades Planejadas:</b></h6>
                <div class="p-3 bg-light border rounded" id="detalheDescricao"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/pt-br.js"></script>

<script>
    var calendar;

    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');

        calendar = new FullCalendar.Calendar(calendarEl, {
            locale: 'pt-br',
            initialView: 'dayGridMonth', // Visão mensal padrão grande
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek'
            },
            events: '/api/manutencoes/eventos', // Rota que criamos no Flask

            // Evento de clique em uma data marcada
            eventClick: function(info) {
                var props = info.event.extendedProps;

                // Mapeia os dados nos campos do modal de visualização
                document.getElementById('detalheTitulo').innerText = info.event.title;
                document.getElementById('detalheMaquina').innerText = props.maquina;
                document.getElementById('detalheLinha').innerText = props.linha;
                document.getElementById('detalheDescricao').innerText = props.descricao;
                document.getElementById('detalheOS').innerText = "Nº " + props.os_id;

                var statusBadge = document.getElementById('detalheStatus');
                statusBadge.innerText = props.status;
                statusBadge.className = "badge ";
                if(props.status === 'Pendente') statusBadge.classList.add('badge-warning');
                else if(props.status === 'Em Atraso') statusBadge.classList.add('badge-danger');
                else statusBadge.classList.add('badge-success');

                // Abre o modal de exibição
                $('#modalDetalhesManutencao').modal('show');
            }
        });

        calendar.render();
    });

// Função correta para atualizar os filtros dinâmicos no FullCalendar v5+
function recarregarEventos() {
    var statusSelecionado = document.getElementById('filtroStatus').value;

    // Remove a origem de dados antiga
    calendar.removeAllEventSources();

    // Adiciona a nova origem passando o parâmetro de forma limpa como um objeto customizado
    calendar.addEventSource({
        url: '/api/manutencoes/eventos',
        extraParams: {
            status: statusSelecionado
        }
    });
}

</script>
</body>
</html>
